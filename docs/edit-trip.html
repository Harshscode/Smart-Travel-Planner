<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Trip | Smart Travel Planner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="edit-trip-body">

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="nav-brand">
                <i class="fas fa-plane-departure"></i> Smart Travel Planner
            </a>
            <div class="nav-menu">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="favorites.html" class="nav-link">
                    <i class="fas fa-heart"></i> Favorites
                </a>
                <a href="add-trip.html" class="nav-link">
                    <i class="fas fa-plus-circle"></i> Add Trip
                </a>
            </div>
            <div class="nav-user">
                <span class="user-welcome">
                    <i class="fas fa-user-circle"></i> <span id="userGreeting">User</span>
                </span>
                <a href="login.html" class="btn btn-outline btn-sm" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content form-page">
        <div class="form-container">

            <div class="form-header">
                <a href="dashboard.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
                <h1><i class="fas fa-edit"></i> Edit Trip</h1>
                <p class="page-subtitle">Update the details for your trip to <strong id="headingDestination">this destination</strong>.</p>
            </div>

            <!-- Alert container -->
            <div id="formAlert"></div>

            <form id="tripForm" class="trip-form" novalidate>

                <!-- Destination -->
                <div class="form-group">
                    <label for="destination">
                        <i class="fas fa-map-marker-alt"></i> Destination
                    </label>
                    <input
                        type="text"
                        id="destination"
                        name="destination"
                        placeholder="e.g., Paris, France"
                        required
                    >
                    <small class="form-hint">Enter the city or city and country</small>
                </div>

                <!-- Dates Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="startDate">
                            <i class="fas fa-calendar-check"></i> Start Date
                        </label>
                        <input type="date" id="startDate" name="startDate" required>
                    </div>
                    <div class="form-group">
                        <label for="endDate">
                            <i class="fas fa-calendar-times"></i> End Date
                        </label>
                        <input type="date" id="endDate" name="endDate" required>
                    </div>
                </div>

                <!-- Budget Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="budget">
                            <i class="fas fa-coins"></i> Budget
                        </label>
                        <input
                            type="number"
                            id="budget"
                            name="budget"
                            min="0"
                            step="0.01"
                        >
                    </div>
                    <div class="form-group">
                        <label for="currency">
                            <i class="fas fa-money-bill-wave"></i> Currency
                        </label>
                        <select id="currency" name="currency">
                            <option value="USD">USD — US Dollar</option>
                            <option value="EUR">EUR — Euro</option>
                            <option value="GBP">GBP — British Pound</option>
                            <option value="JPY">JPY — Japanese Yen</option>
                            <option value="CAD">CAD — Canadian Dollar</option>
                            <option value="AUD">AUD — Australian Dollar</option>
                            <option value="CHF">CHF — Swiss Franc</option>
                            <option value="CNY">CNY — Chinese Yuan</option>
                            <option value="INR">INR — Indian Rupee</option>
                            <option value="MXN">MXN — Mexican Peso</option>
                            <option value="BRL">BRL — Brazilian Real</option>
                            <option value="KRW">KRW — Korean Won</option>
                            <option value="SGD">SGD — Singapore Dollar</option>
                            <option value="THB">THB — Thai Baht</option>
                            <option value="ZAR">ZAR — South African Rand</option>
                        </select>
                    </div>
                </div>

                <!-- Notes -->
                <div class="form-group">
                    <label for="notes">
                        <i class="fas fa-sticky-note"></i> Notes <span class="optional">(optional)</span>
                    </label>
                    <textarea
                        id="notes"
                        name="notes"
                        rows="4"
                        placeholder="Any additional notes about your trip..."
                    ></textarea>
                </div>

                <!-- Submit -->
                <div class="form-actions">
                    <a href="dashboard.html" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </div>

            </form>

        </div>
    </main>

    <!-- JS Modules -->
    <script src="js/storage.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/trips.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
